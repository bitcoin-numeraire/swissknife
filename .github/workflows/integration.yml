name: Integration Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # The full suite runs across a matrix that covers each dependency dimension
  # without the redundant cross-product: all four Lightning adapters on sqlite,
  # plus one postgres cell. Storage behaviour is independent of the Lightning
  # provider (and vice-versa), so every test gets both-DB and all-adapter
  # coverage from these cells while the omitted cross cells (e.g. postgres x
  # cln_rest) would add no surface. We deliberately do not tier tests by
  # dependency — that classification is leaky, since one test can touch both
  # storage and the provider at once.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        provider: [lnd_grpc, lnd_rest, cln_grpc, cln_rest]
        database: [sqlite]
        include:
          - provider: lnd_grpc
            database: postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Integration tests (${{ matrix.database }} / ${{ matrix.provider }})
        run: |
          make test-integration \
            ITEST_DATABASE=${{ matrix.database }} \
            ITEST_PROVIDER=${{ matrix.provider }} \
            ITEST_PROJECT=swissknife-itest-${{ matrix.database }}-${{ matrix.provider }}

      - name: Collect dependency logs
        if: failure()
        run: |
          make itest-logs \
            ITEST_PROJECT=swissknife-itest-${{ matrix.database }}-${{ matrix.provider }} || true

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: itest-${{ matrix.database }}-${{ matrix.provider }}
          path: target/itest
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop dependencies
        if: always()
        run: |
          make itest-down \
            ITEST_PROJECT=swissknife-itest-${{ matrix.database }}-${{ matrix.provider }} || true

  # DB-backed Unit-of-Work tests: reservation/settlement balance
  # invariants and concurrency on both SQLite and Postgres.
  persistence:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        database: [sqlite, postgres]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Persistence (UoW) tests (${{ matrix.database }})
        run: |
          make test-persistence \
            ITEST_DATABASE=${{ matrix.database }} \
            ITEST_PROJECT=swissknife-persistence-${{ matrix.database }}

      - name: Stop dependencies
        if: always()
        run: |
          make itest-down ITEST_PROJECT=swissknife-persistence-${{ matrix.database }} || true

  # Full-matrix merged coverage: unit + UoW (both DBs) + the integration suite
  # across every provider x DB cell, merged into one report (printed to the job
  # log and uploaded as lcov). This is the true total coverage.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Full-matrix merged coverage
        run: make coverage-matrix

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error
          retention-days: 14
