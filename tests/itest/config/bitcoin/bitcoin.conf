# bitcoind — integration regtest node.
# Mounted read-only at /etc/bitcoin/bitcoin.conf; chain data lives in the
# (gitignored) runtime volume at the image's default datadir.
server=1
txindex=1
printtoconsole=1
fallbackfee=0.0002
rpcuser=regtest
rpcpassword=regtest
regtest=1

[regtest]
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
zmqpubrawblock=tcp://0.0.0.0:28332
zmqpubrawtx=tcp://0.0.0.0:28333
