# LND — integration regtest node.
# Mounted read-only at /etc/lnd/lnd.conf; TLS cert/key and macaroons default to
# the lnddir (/root/.lnd) which the bootstrap pre-populates with a CA-signed
# cert carrying localhost/lnd/127.0.0.1 SANs.
[Application Options]
alias=swissknife-itest-lnd
debuglevel=info,RPCS=debug,NTFN=debug,LNWL=debug
rpclisten=0.0.0.0:10009
restlisten=0.0.0.0:8080
listen=0.0.0.0:9735
tlsextradomain=localhost
tlsextradomain=lnd
tlsextraip=127.0.0.1
accept-keysend=true

[Bitcoin]
bitcoin.active=true
bitcoin.regtest=true
bitcoin.node=bitcoind

[Bitcoind]
bitcoind.rpchost=bitcoind:18443
bitcoind.rpcuser=regtest
bitcoind.rpcpass=regtest
bitcoind.zmqpubrawblock=tcp://bitcoind:28332
bitcoind.zmqpubrawtx=tcp://bitcoind:28333
