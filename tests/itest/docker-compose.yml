name: swissknife-itest

# Dependency stack for the integration tests. Each daemon is configured from a
# checked-in file under ./config/<daemon>/ (mounted read-only), not inline
# flags. All daemon state lives in Docker-managed named volumes (declared at the
# bottom of this file), so nothing daemon-owned is written to the host tree. The
# few credentials the host-run binary needs (LND cert/macaroon, CLN gRPC certs
# and rune) are copied out of the containers into ./runtime/ by
# scripts/bootstrap.sh.

services:
  postgres:
    image: postgres:18.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  bitcoind:
    image: bitcoin/bitcoin:31.0
    command: ["-conf=/etc/bitcoin/bitcoin.conf"]
    volumes:
      - ./config/bitcoin/bitcoin.conf:/etc/bitcoin/bitcoin.conf:ro
      - bitcoin-data:/home/bitcoin/.bitcoin
    ports:
      - "18443:18443"
      - "18444:18444"
      - "28332:28332"
      - "28333:28333"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bitcoin-cli -regtest -rpcuser=regtest -rpcpassword=regtest getblockchaininfo >/dev/null 2>&1",
        ]
      interval: 2s
      timeout: 5s
      retries: 30

  lnd:
    image: lightninglabs/lnd:v0.21.0-beta
    depends_on:
      bitcoind:
        condition: service_healthy
    command: ["--configfile=/etc/lnd/lnd.conf"]
    volumes:
      - ./config/lnd/lnd.conf:/etc/lnd/lnd.conf:ro
      - lnd-data:/root/.lnd
      # Host-generated TLS cert/key (bootstrap.sh). The host-run binary verifies
      # against the matching CA, so no root-owned cert is pulled back out.
      - ./runtime/lnd/tls.cert:/root/.lnd/tls.cert
      - ./runtime/lnd/tls.key:/root/.lnd/tls.key
    ports:
      - "10009:10009"
      - "8080:8080"
      - "9735:9735"

  cln:
    image: elementsproject/lightningd:v26.06.1
    depends_on:
      bitcoind:
        condition: service_healthy
    environment:
      LIGHTNINGD_NETWORK: regtest
    command: ["--conf=/etc/cln/config"]
    volumes:
      - ./config/cln/config:/etc/cln/config:ro
      - cln-data:/root/.lightning
      - ./runtime/cln/regtest/ca.pem:/root/.lightning/regtest/ca.pem
      - ./runtime/cln/regtest/ca-key.pem:/root/.lightning/regtest/ca-key.pem
      - ./runtime/cln/regtest/server.pem:/root/.lightning/regtest/server.pem
      - ./runtime/cln/regtest/server-key.pem:/root/.lightning/regtest/server-key.pem
      - ./runtime/cln/regtest/client.pem:/root/.lightning/regtest/client.pem
      - ./runtime/cln/regtest/client-key.pem:/root/.lightning/regtest/client-key.pem
    ports:
      - "11002:11002"
      - "3010:3010"
      - "9736:9736"

  # Mock OpenID Connect provider for the OAuth2/OIDC auth tests. Serves standard
  # discovery + JWKS and mints JWTs whose claims are shaped by the checked-in
  # config (matched per request `client_id`). Reached by the host-run binary and
  # the tests at the SAME host:port, so the discovered issuer and the token `iss`
  # agree. Container port 8080 is published on 8090 by default to avoid clashing
  # with LND's REST port (8080).
  mock-oauth2-server:
    image: ghcr.io/navikt/mock-oauth2-server:4.0.1
    environment:
      JSON_CONFIG_PATH: /tmp/mock-oauth2-config.json
    volumes:
      - ./config/mock-oauth2/config.json:/tmp/mock-oauth2-config.json:ro
    ports:
      - "${SWISSKNIFE_ITEST_OAUTH2_PORT:-8090}:8080"

volumes:
  postgres-data:
  bitcoin-data:
  lnd-data:
  cln-data:
